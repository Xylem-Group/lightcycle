[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # bincode 1.x — the team announced a permanent end of maintenance
    # in 2025 (doxxing/harassment incident, not a security flaw). 1.3.3
    # is what the team itself called a "complete version not in need of
    # updates." We use bincode only via the persistence layer in
    # lightcycle-store; replacing it (postcard / bitcode / rkyv) is on
    # the roadmap but not load-bearing while the crate is still a stub.
    # Re-evaluate when lightcycle-store grows real persistence.
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # Unicode-3.0 is the current license for ICU / idna; supersedes the
    # older Unicode-DFS-2016 most allowlists historically named.
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    # Permissive license used by webpki-roots / mozilla CA cert bundle.
    # Allows redistribution with attribution; equivalent in practice
    # to MIT for our use.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Keep dependency tree honest. We've been burned by drift before.
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
